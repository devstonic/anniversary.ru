<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💑 Годовщина: Наша история</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Playfair Display', 'Georgia', serif;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 215, 215, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .music-btn {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            right: max(16px, env(safe-area-inset-right));
            width: 56px;
            height: 56px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 215, 215, 0.5);
            color: #ffb6c1;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom)) 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .card {
            width: 100%;
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 64px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 182, 193, 0.3);
            box-shadow: 0 40px 80px -16px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 182, 193, 0.2) inset;
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '💕';
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 120px;
            opacity: 0.05;
            transform: rotate(15deg);
            pointer-events: none;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }

        .greeting {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            color: #ffb6c1;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
        }

        .holiday-name {
            font-size: clamp(2.2rem, 8vw, 3.2rem);
            color: #fff;
            font-weight: 900;
            margin-top: 8px;
            text-shadow: 3px 3px 0 #ff69b4, 6px 6px 0 rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffb6c1, #ff69b4, #ffb6c1, transparent);
            width: 80%;
            margin: 24px auto;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 20px 0;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 182, 193, 0.2);
            border-radius: 40px;
            padding: 24px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .menu-card:hover {
            background: rgba(255, 182, 193, 0.1);
            border-color: rgba(255, 105, 180, 0.4);
            transform: translateY(-8px) scale(1.02);
        }

        .menu-emoji {
            font-size: 3.5rem;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 15px #ff69b4);
        }

        .menu-title {
            color: #ffb6c1;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .menu-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .story-container {
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .memory-page {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 48px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 182, 193, 0.2);
            box-shadow: 0 20px 40px -16px rgba(0, 0, 0, 0.4);
        }

        .memory-date {
            color: #ffb6c1;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }

        .memory-photo {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            background: linear-gradient(145deg, #ffb6c1, #ff69b4);
            border-radius: 60px 60px 60px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            transform: rotate(-5deg);
            box-shadow: 0 20px 40px -8px rgba(255, 105, 180, 0.4);
        }

        .memory-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.3rem;
            line-height: 1.8;
            text-align: center;
            font-style: italic;
            margin-bottom: 32px;
        }

        .timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, transparent, #ffb6c1, #ff69b4, #ffb6c1, transparent);
        }

        .timeline-item {
            position: relative;
            padding-left: 60px;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .timeline-dot {
            position: absolute;
            left: 12px;
            top: 0;
            width: 16px;
            height: 16px;
            background: #ff69b4;
            border-radius: 50%;
            box-shadow: 0 0 25px #ff69b4;
        }

        .timeline-year {
            color: #ffb6c1;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .timeline-event {
            color: white;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .timeline-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-top: 6px;
        }

        .love-letter {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 48px 48px 48px 24px;
            padding: 40px 24px;
            position: relative;
        }

        .love-letter::before {
            content: '💌';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            filter: drop-shadow(0 5px 10px #ff69b4);
        }

        .letter-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            line-height: 1.9;
            text-align: center;
            margin: 30px 0;
            font-style: italic;
        }

        .letter-signature {
            color: #ffb6c1;
            text-align: right;
            font-size: 1.3rem;
            font-family: 'Dancing Script', cursive;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 48px;
            padding: 32px 24px;
        }

        .question-text {
            color: white;
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 182, 193, 0.3);
            border-radius: 100px;
            padding: 18px 24px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .option-btn:hover {
            background: rgba(255, 105, 180, 0.2);
            border-color: #ff69b4;
            transform: translateX(10px);
        }

        .countdown-box {
            background: linear-gradient(145deg, #ffb6c1, #ff69b4);
            border-radius: 40px;
            padding: 40px 24px;
            text-align: center;
        }

        .countdown-number {
            font-size: 5rem;
            color: white;
            font-weight: 900;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2);
            line-height: 1;
        }

        .countdown-label {
            color: white;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 16px;
        }

        .progress-ring {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            position: relative;
        }

        .ring-percent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: white;
            font-weight: 900;
            text-shadow: 0 0 30px #ff69b4;
        }

        .couple-name {
            font-size: 2rem;
            color: white;
            text-align: center;
            margin: 20px 0;
            font-weight: 700;
        }

        .action-button {
            width: 100%;
            background: rgba(255, 105, 180, 0.2);
            border: 2px solid #ff69b4;
            border-radius: 60px;
            padding: 18px;
            color: white;
            font-size: 1.3rem;
            margin: 12px 0;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .action-button:hover {
            background: #ff69b4;
            transform: scale(1.02);
            box-shadow: 0 10px 30px -5px #ff69b4;
        }

        .final-result {
            text-align: center;
            color: white;
            animation: fadeInPage 0.8s;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .final-emoji {
            font-size: 6rem;
            margin: 20px 0;
            filter: drop-shadow(0 0 40px #ff69b4);
        }

        .final-title {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 20px 0;
            color: #ffb6c1;
            text-shadow: 2px 2px 0 #ff69b4;
        }

        .final-desc {
            font-size: 1.3rem;
            line-height: 1.7;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 25px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 25px 0;
        }

        .stat-item {
            background: rgba(255, 105, 180, 0.1);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 30px;
            padding: 20px 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            color: #ffb6c1;
            font-weight: 900;
        }

        .stat-label {
            color: white;
            font-size: 0.9rem;
